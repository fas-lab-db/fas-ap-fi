    function calculateShopMonthlyAmount(shop) {
        let menuFee = shop.menu_item_count <= 10 ? BASE_MENU_PRICE : BASE_MENU_PRICE + (shop.menu_item_count - 10) * EXTRA_ITEM_PRICE;
        let tillFee = shop.till_enabled ? TILL_PRICE : 0;
        let extraFee = shop.extra_addons_count > FREE_EXTRA_LIMIT ? (shop.extra_addons_count - FREE_EXTRA_LIMIT) * EXTRA_ADDON_MONTHLY_FEE : 0;
        let advertFee = shop.adverts ? shop.adverts.reduce((sum, a) => sum + (a.amount || 0), 0) : 0;
        let penalty = shop.penalty_amount || 0;
        return menuFee + tillFee + extraFee + advertFee + penalty;
    }

        shop_address: document.getElementById('newShopAddress')?.value,
        owner_name: document.getElementById('newOwnerName')?.value,
        business_type: document.getElementById('newBusinessType')?.value,
        menu_item_count: parseInt(document.getElementById('newMenuCount')?.value || 10),
        till_enabled: document.getElementById('newTillEnabled')?.value === 'true',
        extra_addons_count: parseInt(document.getElementById('newExtraCount')?.value || 0),
        adverts: [],
        registration_date: new Date().toISOString(),
        payment_status: "pay_next",
        is_active: true,
        is_suspended: false,
        penalty_amount: 0,
        last_payment_date: null,
        payment_history: []
    };

    const { data, error } = await supabaseClient
        .from('shops')
        .insert([newShop])
        .select()
        .single();

if (error) {
    console.error(error);

    if (error.message.includes('duplicate')) {
        alert('System error: Duplicate ID detected. Please try again.');
    } else {
        alert('Failed to create shop. Please try again.');
    }

    return;
}

    alert(`Shop created! ID: ${data.id} | Ref: ${data.payment_ref}`);
    await loadAllShops();
}
    
    async function editShop(shopId) {
        const { data: shop } = await supabaseClient.from('shops').select('*').eq('id', shopId).single();
        if(!shop) return;
        const editHtml = `<div class="modal fade modal-custom" id="editShopModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Edit: ${shop.shop_name}</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
                <label>Menu Items</label><input type="number" id="editMenuCount" class="form-control mb-2" value="${shop.menu_item_count}">
                <label>Till System</label><select id="editTillEnabled" class="form-control mb-2"><option value="true" ${shop.till_enabled ? 'selected' : ''}>Yes (+R50)</option><option value="false" ${!shop.till_enabled ? 'selected' : ''}>No</option></select>
                <label>Extra Add-ons</label><input type="number" id="editExtraCount" class="form-control mb-2" value="${shop.extra_addons_count}">
                <label>Penalty Amount</label><input type="number" id="editPenalty" class="form-control mb-2" value="${shop.penalty_amount || 0}">
                <label>Payment Status</label><select id="editPaymentStatus" class="form-control">
                    <option value="pay_next">First Month Free</option>
                    <option value="due">Due</option>
                    <option value="paid">Paid</option>
                    <option value="overdue">Overdue</option>
                </select>
                <hr><h6>Adverts</h6><div id="advertsList">${shop.adverts?.map((a,i) => `<div class="advert-item">${a.name}: R${a.amount} <button class="btn btn-sm btn-danger" onclick="removeAdvert('${shopId}',${i})">✖</button></div>`).join('') || 'None'}</div>
                <div class="row mt-2"><div class="col-6"><input id="advertName" placeholder="Advert name" class="form-control"></div><div class="col-4"><input id="advertAmount" placeholder="R" class="form-control"></div><div class="col-2"><button class="btn btn-fas-sm" onclick="addAdvertToShop('${shopId}')">+</button></div></div>
            </div>
            <div class="modal-footer"><button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button><button class="btn btn-fas" onclick="saveShopEdit('${shopId}')">Save</button></div>
        </div></div></div>`;
        document.body.insertAdjacentHTML('beforeend', editHtml);
        new bootstrap.Modal(document.getElementById('editShopModal')).show();
        document.getElementById('editShopModal').addEventListener('hidden.bs.modal', () => { removeAllModals(); document.getElementById('editShopModal')?.remove(); });
    }
    
    async function addAdvertToShop(shopId) {
        const name = document.getElementById('advertName')?.value.trim();
        const amount = parseFloat(document.getElementById('advertAmount')?.value);
        if(!name || isNaN(amount)) { alert('Enter advert name and amount'); return; }
        const { data: shop } = await supabaseClient.from('shops').select('adverts').eq('id', shopId).single();
        const adverts = shop.adverts || [];
        adverts.push({ name, amount });
        await supabaseClient.from('shops').update({ adverts }).eq('id', shopId);
        editShop(shopId);
    }
    
    async function removeAdvert(shopId, index) {
        const { data: shop } = await supabaseClient.from('shops').select('adverts').eq('id', shopId).single();
        const adverts = shop.adverts || [];
        adverts.splice(index, 1);
        await supabaseClient.from('shops').update({ adverts }).eq('id', shopId);
        editShop(shopId);
    }
    
    async function saveShopEdit(shopId) {
        await supabaseClient.from('shops').update({
            menu_item_count: parseInt(document.getElementById('editMenuCount')?.value),
            till_enabled: document.getElementById('editTillEnabled')?.value === 'true',
            extra_addons_count: parseInt(document.getElementById('editExtraCount')?.value),
            penalty_amount: parseFloat(document.getElementById('editPenalty')?.value) || 0,
            payment_status: document.getElementById('editPaymentStatus')?.value
        }).eq('id', shopId);
        document.getElementById('editShopModal')?.remove();
        removeAllModals();
        await loadAllShops();
    }
    
    async function generateInvoice(shopId) {
        const { data: shop } = await supabaseClient.from('shops').select('*').eq('id', shopId).single();
        if(!shop) return;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        const amount = calculateShopMonthlyAmount(shop);
        const dueDate = calculateDueDate(shop.registration_date);
        doc.setFillColor(240,87,45); doc.rect(0,0,210,45,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(24); doc.setFont('helvetica','bold'); doc.text('FASFOOD',20,28);
        doc.setTextColor(240,87,45); doc.setFontSize(18); doc.text('TAX INVOICE',105,55,{align:'center'});
        doc.setTextColor(0,0,0); doc.setFontSize(10);
        doc.text(`Shop: ${shop.shop_name}`,20,80);
        doc.text(`Shop ID: ${shop.id} | Payment Ref: ${shop.payment_ref}`,20,88);
        doc.text(`Amount Due: R${amount}`,20,96);
        doc.text(`Due Date: ${dueDate.toLocaleDateString('en-ZA')}`,20,104);
        doc.text(`Bank: Standard Bank | Acc: 10214743584 | Ref: ${shop.payment_ref}`,20,120);
        doc.save(`${shop.id}_Invoice.pdf`);
        alert('Invoice downloaded');
    }
    
    async function markAsPaid(shopId) {
        const { data: shop } = await supabaseClient.from('shops').select('*').eq('id', shopId).single();
        await supabaseClient.from('shops').update({ payment_status: 'paid', last_payment_date: new Date().toISOString() }).eq('id', shopId);
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ unit: 'mm', format: 'a4' });
        doc.setFillColor(240,87,45); doc.rect(0,0,210,45,'F');
        doc.setTextColor(255,255,255); doc.setFontSize(24); doc.text('FASFOOD',20,28);
        doc.setTextColor(240,87,45); doc.setFontSize(18); doc.text('PAYMENT RECEIPT',105,55,{align:'center'});
        doc.setTextColor(0,0,0); doc.setFontSize(10);
        doc.text(`Shop: ${shop.shop_name}`,20,80);
        doc.text(`Shop ID: ${shop.id} | Payment Ref: ${shop.payment_ref}`,20,88);
        doc.text(`Amount Paid: R${calculateShopMonthlyAmount(shop)}`,20,96);
        doc.text(`Date: ${new Date().toLocaleDateString()}`,20,104);
        doc.text(`Status: PAID`,20,112);
        doc.save(`${shop.id}_Receipt.pdf`);
        alert('Receipt downloaded');
        await loadAllShops();
    }
    
async function toggleSuspend(shopId) {
    const { data: shop } = await supabaseClient.from('shops').select('is_suspended, payment_status, penalty_amount').eq('id', shopId).single();
    
    if (shop.is_suspended) {
        const newPenalty = (shop.penalty_amount || 0) + 100;
        if (confirm(`Reactivate this shop? A penalty fee of R100 will be added. Total penalty: R${newPenalty}`)) {
            await supabaseClient.from('shops').update({ 
                is_suspended: false, 
                penalty_amount: newPenalty,
                payment_status: 'due'
            }).eq('id', shopId);
            alert(`Shop reactivated. Penalty fee R100 added.`);
        } else {
            return;
        }
    } else {
        if (confirm(`Suspend this shop?`)) {
            await supabaseClient.from('shops').update({ is_suspended: true }).eq('id', shopId);
            alert(`Shop suspended.`);
        } else {
            return;
        }
    }
    await loadAllShops();
}
    function escapeHtml(str) { if(!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
    
    window.viewShopStatus = viewShopStatus; window.backToShopLogin = backToShopLogin;
    window.loginFinanceAdmin = loginFinanceAdmin; window.logoutFinance = logoutFinance;
    window.showCreateShopModal = showCreateShopModal; window.createNewShop = createNewShop;
    window.editShop = editShop; window.addAdvertToShop = addAdvertToShop;
    window.removeAdvert = removeAdvert; window.saveShopEdit = saveShopEdit;
    window.markAsPaid = markAsPaid; window.toggleSuspend = toggleSuspend;
    window.generateInvoice = generateInvoice;
    
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('admin') === 'finance2024') {
        document.getElementById('shopPortal').style.display = 'none';
        document.getElementById('financeLoginContainer').style.display = 'block';
    }

    let allShopsData = [];

function applyFilters() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const status = document.getElementById('filterStatus').value;

    let filtered = allShopsData.filter(shop => {
        const matchSearch =
            shop.id.toLowerCase().includes(search) ||
            shop.payment_ref.toLowerCase().includes(search) ||
            shop.shop_name.toLowerCase().includes(search) ||
            (shop.shop_email || '').toLowerCase().includes(search);

        const matchStatus = status ? shop.payment_status === status : true;

        return matchSearch && matchStatus;
    });

    renderFinanceDashboard(filtered);

    //?admin=finance2024 error
}
</script>
